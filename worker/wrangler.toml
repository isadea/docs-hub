name = "docs-hub-oracle"
main = "worker.js"
compatibility_date = "2024-11-01"

# The Claude key is set as a secret, NOT here:
#   npx wrangler secret put ANTHROPIC_API_KEY
# Restrict who can call this Worker to your app's origin(s):
[vars]
ALLOWED_ORIGIN = "https://YOUR-PAGES-SUBDOMAIN.pages.dev"

# A KV namespace caches model results so re-runs don't re-bill.
# Create it once:  npx wrangler kv namespace create CACHE
# then paste the id below.
[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_KV_ID"
