# Builds the app and publishes to GitHub Pages on push to main.
# Repo Settings -> Pages -> Source: "GitHub Actions".
# Repo Settings -> Secrets and variables -> Actions -> Variables:
#   VITE_BASE        = /<your-repo-name>/        (e.g. /docs-hub/)
#   VITE_ORACLE_URL  = https://docs-hub-oracle.<you>.workers.dev
# No API key here — the Claude key lives only in the Cloudflare Worker.
name: Deploy to GitHub Pages
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions: { contents: read, pages: write, id-token: write }
concurrency: { group: pages, cancel-in-progress: true }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: ${{ vars.VITE_BASE }}
          VITE_ORACLE_URL: ${{ vars.VITE_ORACLE_URL }}
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: "${{ steps.deployment.outputs.page_url }}" }
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
